[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "basefunctions"
version = "0.0.1"
authors = [
  { name="Ralph Vogl", email="neutro2@outlook.de" },
]
description = "basic functionality as a convenience package"
readme = "readme.md"
license = { file="license" }
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
  'beautifulsoup4 >= 4.11',
  'loguru >= 0.6',
  'pandas >=1.4.3',
  'requests >= 2.0',
  'tabulate >= 0.7',
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]


[project.urls]
"Homepage" = "https://github.com/neuraldevelopment/basefunctions"
"Bug Tracker" = "https://github.com/neuraldevelopment/basefunctions/issues"
